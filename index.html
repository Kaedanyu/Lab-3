<body>

        <div class="row">
            <div class="col-md">
            </div>
            <div class="col-md">
                <!-- give text classes to edit in CSS -->
                <h1 class="heading-text">Crime in Toronto</h1>
            </div>
            <div class="col-md">
            </div>

                    <select id="ASSAULT_2025" name="ASSAULT_2025">

                        <option value="['>=',51]">51-100</option>
                        <option value="['>=',101]">101-150</option>
                        <option value="['>=',151]">151-200</option>
                        <option value="['>=',201]">201+</option>
                    </select>
                </fieldset>
            </form>
            </div>


            <!-- bootstrap center map through flexport -->
            <div class="d-flex justify-content-center">

                <script src="script.js"></script>
